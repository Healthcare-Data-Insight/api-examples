services:
  ediconvert:
    image: myarch/ediconvert:2.15.1
    restart: unless-stopped
    #environment:
      # you can provide your license key as a variable instead of saving the license file to the "etc." volume.
      # Copy the key from edi-license.txt and paste it here
      #- LICENSE_KEY=<your license key>
      # You can also optionally set the following environment variables:
      #- EDI_VALIDATE=True
      #- EDI_CONVERT_CONTROL_SEGMENTS=True
      #- EDI_TRANSACTION_TOP_LEVEL=True
      #- EDI_NDJSON=True
    volumes:
      # Copy your license file to the "etc" directory on your host unless you use LICENSE_KEY
      - ./etc:/app/etc
      # Optional: volume used by the EDI Viewer to load files from when the "file" query parameter is provided
      - ./load:/app/load
    ports:
      # Change the port here
      - "5080:5080"